<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Consistent Blue Background -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="#1E3A8A"/>

  <!-- Stack of Layers -->
  <g stroke="#F97316" stroke-width="6" fill="none" stroke-linejoin="round">
    <!-- Top Layer -->
    <polygon points="50,20 80,35 50,50 20,35" />
    <!-- Middle Layer -->
    <polyline points="20,48 50,63 80,48" />
    <!-- Bottom Layer -->
    <polyline points="20,61 50,76 80,61" />
  </g>

  <!-- Prominent Orange Plus Sign on the bottom right -->
  <g transform="translate(65, 65)">
    <circle cx="10" cy="10" r="15" fill="#1E3A8A" /> <!-- Cutout background for clarity -->
    <line x1="10" y1="0" x2="10" y2="20" stroke="#F97316" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="10" x2="20" y2="10" stroke="#F97316" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
